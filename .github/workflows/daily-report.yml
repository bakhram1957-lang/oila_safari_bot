name: Kunlik safar rejasi

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Repository kodini olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kerakli kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      - name: Botni ishga tushirish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python daily_report.py

      - name: Holatni saqlash (state/config.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/config.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Holatni yangilash"
          git push
